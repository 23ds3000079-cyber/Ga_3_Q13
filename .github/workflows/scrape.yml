name: DataDash QA Automation - 23ds3000079

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python - 23ds3000079@ds.study.iitm.ac.in
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests beautifulsoup4
        
    - name: Install Playwright browsers with dependencies - 23ds3000079@ds.study.iitm.ac.in
      run: |
        python -m playwright install chromium
        sudo apt-get update
        sudo apt-get install -y libgbm-dev libxkbcommon-x11-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2
        
    - name: Verify installation
      run: |
        python --version
        pip list | grep playwright
        
    - name: Run scraping script - 23ds3000079@ds.study.iitm.ac.in
      run: python scrape.py
      continue-on-error: false
      
    - name: Display results in summary
      if: always()
      run: |
        echo "## 📊 DataDash QA Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Generated by 23ds3000079@ds.study.iitm.ac.in*" >> $GITHUB_STEP_SUMMARY
        if [ -f results.txt ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
