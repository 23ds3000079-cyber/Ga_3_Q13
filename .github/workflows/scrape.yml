name: DataDash QA - 23ds3000079

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Node.js - 23ds3000079@ds.study.iitm.ac.in
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Playwright
      run: npm install playwright
        
    - name: Install browsers
      run: npx playwright install chromium
      
    - name: Run scraper
      run: |
        node -e "
        const { chromium } = require('playwright');
        (async () => {
          const seeds = [56,57,58,59,60,61,62,63,64,65];
          let total = 0;
          const browser = await chromium.launch();
          
          for (const seed of seeds) {
            const page = await browser.newPage();
            await page.goto('https://data-kw4d.onrender.com/seed' + seed, { timeout: 30000 });
            
            // Wait for content
            await page.waitForSelector('table', { timeout: 5000 }).catch(() => {});
            
            // Get all numbers
            const nums = await page.evaluate(() => {
              const numbers = [];
              document.querySelectorAll('td, th, .number').forEach(el => {
                const val = parseFloat(el.textContent);
                if (!isNaN(val)) numbers.push(val);
              });
              return numbers;
            });
            
            const sum = nums.reduce((a,b) => a + b, 0);
            console.log('Seed ' + seed + ': ' + nums.length + ' numbers, sum = ' + sum);
            total += sum;
            await page.close();
          }
          
          await browser.close();
          console.log('\\n' + '='.repeat(50));
          console.log('GRAND TOTAL: ' + total);
          console.log('='.repeat(50));
          console.log('23ds3000079@ds.study.iitm.ac.in');
        })().catch(console.error);
        "
