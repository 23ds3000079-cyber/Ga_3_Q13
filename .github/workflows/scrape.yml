name: DataDash QA Automation - 23ds3000079

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python - 23ds3000079@ds.study.iitm.ac.in
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright browsers - 23ds3000079@ds.study.iitm.ac.in
      run: |
        python -m playwright install chromium
        python -m playwright install-deps
        
    - name: Run scraping script - 23ds3000079@ds.study.iitm.ac.in
      run: python scrape.py
      
    - name: Display results in summary
      if: always()
      run: |
        echo "## 📊 DataDash QA Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Generated by 23ds3000079@ds.study.iitm.ac.in*" >> $GITHUB_STEP_SUMMARY
