name: DataDash QA Automation - 23ds3000079

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]

jobs:
  scrape-and-sum:
    runs-on: ubuntu-latest
    
    # Step with email in the name as required
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js - 23ds3000079@ds.study.iitm.ac.in
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps
      
    - name: Run scraping script - 23ds3000079@ds.study.iitm.ac.in
      run: npm run scrape
      
    - name: Save results to file - 23ds3000079@ds.study.iitm.ac.in
      run: |
        echo "## DataDash QA Results - $(date)" > results.md
        echo "" >> results.md
        echo "### Grand Total Sum: \`${{ steps.scrape.outputs.total }}\`" >> results.md
        echo "" >> results.md
        echo "*Generated by 23ds3000079*" >> results.md
      
    - name: Upload results as artifact
      uses: actions/upload-artifact@v3
      with:
        name: scrape-results
        path: results.md
